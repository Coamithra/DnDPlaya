# DnDPlaya configuration
# CLI flags override these values.

[session]
# LLM provider: anthropic or ollama
provider = anthropic
# Model alias (haiku, sonnet, opus) or full Anthropic model ID (used when provider = anthropic)
model = haiku
# Ollama model name (used when provider = ollama)
ollama_model = qwen2.5:14b
# Ollama API URL (used when provider = ollama)
ollama_url = http://localhost:11434
# Ollama context window in tokens (default: 32768). Passed via native API.
# Ollama's default is only 4k on <24GB VRAM — this override is critical.
ollama_num_ctx = 32768
# Max tokens per agent response
max_tokens = 2048
# Party level (1-11)
party_level = 3
# Max DM turns before session ends (default: 100)
max_turns = 100
# Random seed for reproducibility (leave empty for random)
seed =

[ui]
# Web server port
port = 8080
# Path to directory of .mp3 files for background music (leave empty to disable)
music = ./music
# Disable review_note tools to save tokens (true/false)
no_reviews = true
# Enable extended thinking for player agents - debugging only (true/false)
thinking = false

[output]
# Output directory for transcripts, logs, and reviews (leave empty for default)
dir =
